<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Luminary Studio</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #17120e;
      --navy-mid: #231a12;
      --gold: #b8733a;
      --gold-light: #d4956a;
      --gold-dim: rgba(184, 115, 58, 0.12);
      --text: #f5f0eb;
      --text-dim: rgba(245, 240, 235, 0.55);
      --border: rgba(245, 240, 235, 0.08);
      --border-gold: rgba(184, 115, 58, 0.25);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(184,115,58,0.07) 0%, transparent 70%);
      top: -150px; right: -100px;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(35,26,18,0.5) 0%, transparent 70%);
      bottom: -80px; left: -80px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      opacity: 0.12;
      user-select: none;
    }

    .label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: -1rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
      line-height: 1.15;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    p {
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.7;
      max-width: 36ch;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--navy);
      background: var(--gold);
      padding: 0.85rem 1.8rem;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-dim);
      border: 1px solid var(--border-gold);
      padding: 0.85rem 1.8rem;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      transform: translateY(-2px);
    }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--border-gold), transparent);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <div class="content">
    <div class="code" aria-hidden="true">404</div>
    <span class="label">Page not found</span>
    <h1>This page<br /><em>doesn't exist</em></h1>
    <p>The page you're looking for may have been moved, renamed, or never existed. Let's get you back somewhere familiar.</p>
    <div class="divider" aria-hidden="true"></div>
    <div class="actions">
      <a href="/" class="btn-primary">Go to Homepage</a>
      <a href="/#contact" class="btn-ghost">Contact Us</a>
    </div>
  </div>

  <footer>© {{ year }} Luminary Studio</footer>
</body>
</html>
